name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode keystore
        if: secrets.keystore_base64 != ''
        run: |
          echo "${{ secrets.keystore_base64 }}" | base64 --decode > ./keystore.jks
        shell: bash

      - name: Create gradle properties
        run: |
          cat > gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=keystore.jks
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.keystore_password }}
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.key_alias }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.key_password }}
          org.gradle.jvmargs=-Xmx2g
          EOF

      - name: Grant execute to gradlew
        run: chmod +x ./gradlew

      - name: Show Gradle version
        run: ./gradlew --version

      - name: List available tasks (diagnostic)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: ./gradlew tasks --all

      - name: Build release APK (assembleRelease)
        run: |
          # Avoid running lint tasks automatically; run only assembleRelease
          ./gradlew :app:assembleRelease --no-daemon --no-configuration-cache -x lint -x lintFix -x ktlint
        env:
          JAVA_OPTS: -Xmx2g

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            **/build/outputs/**/*.apk
            */build/outputs/**/*.apk

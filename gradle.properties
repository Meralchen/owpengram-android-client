# Memory: GitHub runners have 7GB RAM. Use 4GB to leave room for the OS and other steps.
# Add ParallelGC for faster garbage collection in CI.
org.gradle.jvmargs=-Xmx6096m -XX:+UseParallelGC -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# Core CI Optimizations
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Android Speed Improvements
android.useAndroidX=true
# DISABLE Jetifier if possible; it is a major build bottleneck.
android.enableJetifier=false
# Faster compilation by avoiding R class generation for every module.
android.nonTransitiveRClass=true
android.nonFinalResIds=true
android.enableR8.fullMode=true

# Build Features
android.defaults.buildfeatures.buildconfig=true
